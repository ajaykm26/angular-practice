<div class="demo">
  <h3>@Input / @Output Communication</h3>

  <div class="section">
    <h4>Parent State</h4>
    <label>Message to child: <input [(ngModel)]="messageToChild" /></label>
    <p @if(receivedFromChild)>
      Child said: <strong>{{ receivedFromChild }}</strong> ({{ childClickCount }}x)
    </p>
  </div>

  <div class="section">
    <h4>Child Component</h4>
    <!-- Property binding passes data to @Input -->
    <!-- Event binding listens to @Output EventEmitter -->
    <app-child
      [message]="messageToChild"
      (buttonClicked)="onChildClicked($event)">
    </app-child>
  </div>
</div>
